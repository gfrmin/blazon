# Cloudflare Pages config. Deploy with:  npx wrangler pages deploy dist
# (or `npm run deploy`, or connect the git repo in the Cloudflare dashboard
#  with build command `npm run build` and output directory `dist`).
# Cloudflare Pages reads project config from THIS file, not the dashboard.
name = "blazon"
compatibility_date = "2026-06-19"
pages_build_output_dir = "dist"

# Rate-limit KV for /api/generate (abuse / cost backstop). Create the namespace,
# then uncomment and paste its id (until then the function still gates on
# Turnstile; rate-limiting just isn't applied):
#   npx wrangler kv namespace create RATE
# [[kv_namespaces]]
# binding = "RATE"
# id = "PASTE_KV_NAMESPACE_ID_HERE"
