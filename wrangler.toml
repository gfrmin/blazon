# Cloudflare Pages config. Deploy with:  npx wrangler pages deploy dist
# (or `npm run deploy`, or connect the git repo in the Cloudflare dashboard
#  with build command `npm run build` and output directory `dist`).
# Cloudflare Pages reads project config from THIS file, not the dashboard.
#
# NEVER add public/404.html — this is a client-routed SPA (App.jsx switches
# views, e.g. /studio) and Pages' default SPA fallback (unmatched paths serve
# index.html with a 200) is what makes deep links and refreshes work. A
# 404.html would override that fallback and break them.
name = "blazon"
compatibility_date = "2026-06-19"
pages_build_output_dir = "dist"

# Rate-limit KV for /api/generate (abuse / cost backstop).
[[kv_namespaces]]
binding = "RATE"
id = "de4812ca80b3454193bb009defd3124e"
