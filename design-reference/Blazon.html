document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ground:transparent}\n  @keyframes chgpop{from{opacity:.12}to{opacity:1}}\n  @keyframes hintpulse{0%,100%{opacity:.35}50%{opacity:1}}\n  @keyframes zonepulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.42)}}\n  @keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}\n  @keyframes spin{to{transform:rotate(360deg)}}\n  textarea,input,button{font-family:inherit}\n  textarea:focus,input:focus{outline:none}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family:'Inter',system-ui,sans-serif;color:#ECE6D8;background:#0C0F17;-webkit-font-smoothing:antialiased\">\n\n  <sc-if value=\"{{ isLanding }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"min-height:100vh\">\n\n    <header style=\"max-width:1200px;margin:0 auto;padding:26px 32px;display:flex;align-items:center;justify-content:space-between\">\n      <div style=\"display:flex;align-items:center;gap:13px\">\n        <svg width=\"30\" height=\"34\" viewBox=\"0 0 30 34\"><path d=\"M2,3 H28 V18 C28,26 22,31 15,33 C8,31 2,26 2,18 Z\" fill=\"#16273E\" stroke=\"#C9A24B\" stroke-width=\"1.6\"><\u002Fpath><path d=\"M2,3 H9 L28,28 V33 H21 L2,8 Z\" fill=\"#C9A24B\" opacity=\"0.9\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:25px;letter-spacing:.5px\">Blazon<\u002Fspan>\n      <\u002Fdiv>\n      <nav style=\"display:flex;align-items:center;gap:30px\">\n        <a href=\"#modes\" style=\"color:rgba(236,230,216,.66);text-decoration:none;font-size:14.5px\">Modes<\u002Fa>\n        <a href=\"#gallery\" style=\"color:rgba(236,230,216,.66);text-decoration:none;font-size:14.5px\">Gallery<\u002Fa>\n        <a href=\"#pricing\" style=\"color:rgba(236,230,216,.66);text-decoration:none;font-size:14.5px\">Pricing<\u002Fa>\n        <button onclick=\"{{ goStudio }}\" style=\"background:#C9A24B;color:#0C0F17;border:none;padding:11px 20px;border-radius:7px;font-weight:600;font-size:14.5px;cursor:pointer\">Open the Studio<\u002Fbutton>\n      <\u002Fnav>\n    <\u002Fheader>\n\n    <section style=\"max-width:1200px;margin:0 auto;padding:54px 32px 88px;display:grid;grid-template-columns:1.05fr .95fr;gap:72px;align-items:center\">\n      <div>\n        <div style=\"font-size:12.5px;letter-spacing:3.5px;color:#C9A24B;font-weight:600;margin-bottom:22px\">DESIGN A COAT OF ARMS<\u002Fdiv>\n        <h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:62px;line-height:1.04;margin:0 0 24px;text-wrap:balance\">Every family has a story worth a coat&nbsp;of&nbsp;arms.<\u002Fh1>\n        <p style=\"font-size:18px;line-height:1.6;color:rgba(236,230,216,.72);max-width:30em;margin:0 0 34px\">Describe someone you love. We translate it into authentic heraldry — the same grammar heralds have used for eight hundred years — and render it in bold, flat colour.<\u002Fp>\n        <div style=\"display:flex;gap:14px;align-items:center\">\n          <button onclick=\"{{ goStudio }}\" style=\"background:#C9A24B;color:#0C0F17;border:none;padding:15px 26px;border-radius:8px;font-weight:600;font-size:16px;cursor:pointer\">Start with a description<\u002Fbutton>\n          <a href=\"#modes\" style=\"color:#ECE6D8;text-decoration:none;font-size:15.5px;padding:15px 6px;border-bottom:1px solid rgba(201,162,75,.4)\">See how it works<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:26px\">\n        <div style=\"width:100%;max-width:392px;background:radial-gradient(circle at 50% 44%, rgba(201,162,75,.12), transparent 68%);padding:8px 8px 4px\">\n          <div style=\"width:100%;margin:0 auto\">{{ heroShield }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:100%;max-width:392px;display:flex;flex-direction:column;gap:11px;margin-top:-6px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between\">\n            <span style=\"font-size:11.5px;letter-spacing:1.5px;color:rgba(236,230,216,.5)\">TAP A PART TO CHANGE IT<\u002Fspan>\n            <button onclick=\"{{ surpriseMe }}\" style=\"display:flex;align-items:center;gap:7px;background:rgba(201,162,75,.12);border:1px solid rgba(201,162,75,.4);border-radius:20px;padding:6px 14px;cursor:pointer;color:#C9A24B;font-size:13px;font-weight:600\" style-hover=\"display:flex;align-items:center;gap:7px;background:rgba(201,162,75,.24);border:1px solid #C9A24B;border-radius:20px;padding:6px 14px;cursor:pointer;color:#ECE6D8;font-size:13px;font-weight:600\">⚄ Surprise me<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px\">\n            <button onclick=\"{{ cycleHeroField }}\" onmouseenter=\"{{ hoverFieldEnter }}\" onmouseleave=\"{{ hoverLeave }}\" style=\"display:flex;align-items:center;gap:11px;background:#16273E;border:1px solid rgba(201,162,75,.32);border-radius:10px;padding:11px 14px;cursor:pointer;color:#ECE6D8;text-align:left\" style-hover=\"display:flex;align-items:center;gap:11px;background:#1E3A5C;border:1px solid #C9A24B;border-radius:10px;padding:11px 14px;cursor:pointer;color:#ECE6D8;text-align:left\">\n              <span style=\"{{ heroFieldSwatchStyle }}\"><\u002Fspan>\n              <span style=\"font-size:11px;letter-spacing:.5px;color:rgba(236,230,216,.5);width:66px;flex:none\">FIELD<\u002Fspan>\n              <span style=\"font-family:'Cormorant Garamond',serif;font-size:17px;color:#ECE6D8;flex:1\">{{ heroFieldName }}<\u002Fspan>\n              <span style=\"font-size:15px;color:#C9A24B\">↻<\u002Fspan>\n            <\u002Fbutton>\n            <button onclick=\"{{ cycleHeroOrdinary }}\" onmouseenter=\"{{ hoverOrdEnter }}\" onmouseleave=\"{{ hoverLeave }}\" style=\"display:flex;align-items:center;gap:11px;background:#16273E;border:1px solid rgba(201,162,75,.32);border-radius:10px;padding:11px 14px;cursor:pointer;color:#ECE6D8;text-align:left\" style-hover=\"display:flex;align-items:center;gap:11px;background:#1E3A5C;border:1px solid #C9A24B;border-radius:10px;padding:11px 14px;cursor:pointer;color:#ECE6D8;text-align:left\">\n              <span style=\"width:18px;height:18px;flex:none;border-radius:4px;border:1.5px solid #C9A24B;display:flex;align-items:center;justify-content:center;font-size:11px;color:#C9A24B\">✕<\u002Fspan>\n              <span style=\"font-size:11px;letter-spacing:.5px;color:rgba(236,230,216,.5);width:66px;flex:none\">STRUCTURE<\u002Fspan>\n              <span style=\"font-family:'Cormorant Garamond',serif;font-size:17px;color:#ECE6D8;flex:1\">{{ heroOrdName }}<\u002Fspan>\n              <span style=\"font-size:15px;color:#C9A24B\">↻<\u002Fspan>\n            <\u002Fbutton>\n            <button onclick=\"{{ cycleHeroSymbol }}\" onmouseenter=\"{{ hoverChgEnter }}\" onmouseleave=\"{{ hoverLeave }}\" style=\"display:flex;align-items:center;gap:11px;background:#16273E;border:1px solid rgba(201,162,75,.32);border-radius:10px;padding:11px 14px;cursor:pointer;color:#ECE6D8;text-align:left\" style-hover=\"display:flex;align-items:center;gap:11px;background:#1E3A5C;border:1px solid #C9A24B;border-radius:10px;padding:11px 14px;cursor:pointer;color:#ECE6D8;text-align:left\">\n              <span style=\"{{ heroSymbolSwatchStyle }}\"><\u002Fspan>\n              <span style=\"font-size:11px;letter-spacing:.5px;color:rgba(236,230,216,.5);width:66px;flex:none\">SYMBOL<\u002Fspan>\n              <span style=\"font-family:'Cormorant Garamond',serif;font-size:17px;color:#ECE6D8;flex:1\">{{ heroSymbolName }}<\u002Fspan>\n              <span style=\"font-size:15px;color:#C9A24B\">↻<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:100%;max-width:392px;background:#0E1726;border:1px solid rgba(201,162,75,.22);border-radius:11px;padding:13px 15px;display:flex;align-items:center;gap:12px\">\n          <div style=\"display:flex;background:#16273E;border-radius:7px;padding:3px\">\n            <button onclick=\"{{ setHeroFormal }}\" style=\"{{ heroFormalBtn }}\">Blazon<\u002Fbutton>\n            <button onclick=\"{{ setHeroPlain }}\" style=\"{{ heroPlainBtn }}\">Plain<\u002Fbutton>\n          <\u002Fdiv>\n          <sc-if value=\"{{ heroIsFormal }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:19px;color:#ECE6D8;line-height:1.25\">{{ heroBlazon }}<\u002Fspan><\u002Fsc-if>\n          <sc-if value=\"{{ heroIsPlain }}\"><span style=\"font-size:14px;color:rgba(236,230,216,.78);line-height:1.35\">{{ heroBlazon }}<\u002Fspan><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"modes\" style=\"max-width:1200px;margin:0 auto;padding:34px 32px 30px\">\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:40px;margin:0 0 8px;text-align:center\">Three ways in. One coat of arms.<\u002Fh2>\n      <p style=\"text-align:center;color:rgba(236,230,216,.62);font-size:16px;margin:0 0 42px\">The data is always the blazon. The interface is just a view over it — slide between modes any time, nothing is lost.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px\">\n        <div style=\"background:#101D30;border:1.5px solid #C9A24B;border-radius:13px;padding:28px;position:relative\">\n          <div style=\"position:absolute;top:-11px;left:24px;background:#C9A24B;color:#0C0F17;font-size:11px;font-weight:700;letter-spacing:1px;padding:4px 10px;border-radius:20px\">YOU START HERE<\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;margin:6px 0 10px\">The Gifter<\u002Fdiv>\n          <p style=\"color:rgba(236,230,216,.74);font-size:14.5px;line-height:1.55;margin:0\">Tell us what someone loves. We handle the heraldry and hand back something beautiful to print, frame and give.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#0F1826;border:1px solid rgba(201,162,75,.2);border-radius:13px;padding:28px;display:flex;flex-direction:column\">\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;margin:6px 0 10px;color:rgba(236,230,216,.92)\">The Enthusiast<\u002Fdiv>\n          <p style=\"color:rgba(236,230,216,.62);font-size:14.5px;line-height:1.55;margin:0 0 20px\">Build it yourself with a real charge library. Learn the grammar of a thousand years — the rules explained as you go.<\u002Fp>\n          <div style=\"margin-top:auto;display:flex;align-items:center;gap:9px\">\n            <span style=\"font-size:11px;letter-spacing:1px;color:rgba(236,230,216,.4)\">PALETTE<\u002Fspan>\n            <div style=\"display:flex;gap:6px\">\n              <span style=\"width:15px;height:15px;border-radius:50%;background:#D4AF52\"><\u002Fspan>\n              <span style=\"width:15px;height:15px;border-radius:50%;background:#9F2C2C\"><\u002Fspan>\n              <span style=\"width:15px;height:15px;border-radius:50%;background:#1F4E7A\"><\u002Fspan>\n              <span style=\"width:15px;height:15px;border-radius:50%;background:#2E5A3E\"><\u002Fspan>\n              <span style=\"width:15px;height:15px;border-radius:50%;background:#E7E1D3\"><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#0F1826;border:1px solid rgba(201,162,75,.2);border-radius:13px;padding:28px;display:flex;flex-direction:column\">\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;margin:6px 0 10px;color:rgba(236,230,216,.92)\">The Serious Amateur<\u002Fdiv>\n          <p style=\"color:rgba(236,230,216,.62);font-size:14.5px;line-height:1.55;margin:0 0 20px\">A proper blazon editor with full grammar, live validation and rigorous output. Everything DrawShield should have been.<\u002Fp>\n          <div style=\"margin-top:auto;background:#0A0D14;border:1px solid rgba(201,162,75,.18);border-radius:8px;padding:11px 13px;font-family:'Spline Sans Mono',monospace;font-size:12px;line-height:1.5\"><span style=\"color:#D4AF52\">Or<\u002Fspan><span style=\"color:rgba(236,230,216,.55)\">, a fess <\u002Fspan><span style=\"color:#C76B6B\">gules<\u002Fspan><span style=\"color:rgba(236,230,216,.55)\"> between<\u002Fspan><br><span style=\"color:rgba(236,230,216,.55)\">three roundels <\u002Fspan><span style=\"color:rgba(236,230,216,.85)\">sable<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"gallery\" style=\"max-width:1200px;margin:0 auto;padding:58px 32px 30px\">\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:40px;margin:0 0 36px;text-align:center\">Made with Blazon<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px\">\n        <sc-for list=\"{{ gallery }}\" as=\"g\" hint-placeholder-count=\"3\">\n          <div style=\"background:#0F1826;border:1px solid rgba(201,162,75,.18);border-radius:13px;padding:26px 26px 22px;display:flex;flex-direction:column;align-items:center;text-align:center\">\n            <div style=\"width:130px\">{{ g.shield }}<\u002Fdiv>\n            <div style=\"font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;margin:18px 0 6px\">{{ g.title }}<\u002Fdiv>\n            <div style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:#C9A24B;line-height:1.4\">{{ g.blazon }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"pricing\" style=\"max-width:1200px;margin:0 auto;padding:58px 32px 30px\">\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:40px;margin:0 0 36px;text-align:center\">Pricing<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:18px\">\n        <div style=\"background:#0F1826;border:1px solid rgba(201,162,75,.18);border-radius:13px;padding:26px\">\n          <div style=\"font-size:14px;color:rgba(236,230,216,.6);font-weight:600\">Free<\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;margin:8px 0 14px\">£0<\u002Fdiv>\n          <p style=\"font-size:13.5px;color:rgba(236,230,216,.62);line-height:1.55;margin:0\">One coat of arms, watermarked PNG, view the blazon.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#0F1826;border:1px solid rgba(201,162,75,.18);border-radius:13px;padding:26px\">\n          <div style=\"font-size:14px;color:rgba(236,230,216,.6);font-weight:600\">Personal<\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;margin:8px 0 14px\">£9<span style=\"font-size:15px;color:rgba(236,230,216,.5)\"> /mo<\u002Fspan><\u002Fdiv>\n          <p style=\"font-size:13.5px;color:rgba(236,230,216,.62);line-height:1.55;margin:0\">Unlimited designs, hi-res PNG &amp; SVG, PDF certificate, library.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#101D30;border:1.5px solid #C9A24B;border-radius:13px;padding:26px;position:relative\">\n          <div style=\"position:absolute;top:-11px;left:22px;background:#C9A24B;color:#0C0F17;font-size:10.5px;font-weight:700;letter-spacing:1px;padding:4px 10px;border-radius:20px\">THE GIFT<\u002Fdiv>\n          <div style=\"font-size:14px;color:#C9A24B;font-weight:600\">Gift<\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;margin:8px 0 14px\">£19–49<\u002Fdiv>\n          <p style=\"font-size:13.5px;color:rgba(236,230,216,.7);line-height:1.55;margin:0\">Digital download £19 · physical A3 certificate, framed and posted, £49.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#0F1826;border:1px solid rgba(201,162,75,.18);border-radius:13px;padding:26px\">\n          <div style=\"font-size:14px;color:rgba(236,230,216,.6);font-weight:600\">Creator API<\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;margin:8px 0 14px\">£29<span style=\"font-size:15px;color:rgba(236,230,216,.5)\"> /mo<\u002Fspan><\u002Fdiv>\n          <p style=\"font-size:13.5px;color:rgba(236,230,216,.62);line-height:1.55;margin:0\">REST API, SVG output, embed in your own tools.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"max-width:1200px;margin:0 auto;padding:48px 32px 80px\">\n      <div style=\"background:linear-gradient(115deg,#16273E,#101D30);border:1px solid rgba(201,162,75,.3);border-radius:16px;padding:52px;display:flex;align-items:center;justify-content:space-between;gap:40px\">\n        <div>\n          <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:38px;margin:0 0 10px\">Give someone a coat of arms.<\u002Fh2>\n          <p style=\"font-size:16px;color:rgba(236,230,216,.7);margin:0;max-width:34em;line-height:1.55\">A print-ready A3 certificate, the blazon typeset by hand, posted to your door. The most personal gift you can design in ten minutes.<\u002Fp>\n        <\u002Fdiv>\n        <button onclick=\"{{ goStudio }}\" style=\"background:#C9A24B;color:#0C0F17;border:none;padding:16px 30px;border-radius:8px;font-weight:600;font-size:16px;cursor:pointer;white-space:nowrap\">Design a gift<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <footer style=\"border-top:1px solid rgba(201,162,75,.16);padding:28px 32px;text-align:center;color:rgba(236,230,216,.4);font-size:13px\">Blazon — the heraldic manuscript, made digital. · <span style=\"font-family:'Cormorant Garamond',serif;font-style:italic\">Per fess Or and Azure<\u002Fspan><\u002Ffooter>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isStudio }}\">\n  <div style=\"height:100vh;display:flex;flex-direction:column;overflow:hidden\">\n\n    <header style=\"display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:#101A2A;border-bottom:1px solid rgba(201,162,75,.25);flex:none\">\n      <div style=\"display:flex;align-items:center;gap:13px;cursor:pointer\" onclick=\"{{ goLanding }}\">\n        <svg width=\"24\" height=\"27\" viewBox=\"0 0 30 34\"><path d=\"M2,3 H28 V18 C28,26 22,31 15,33 C8,31 2,26 2,18 Z\" fill=\"#16273E\" stroke=\"#C9A24B\" stroke-width=\"1.6\"><\u002Fpath><path d=\"M2,3 H9 L28,28 V33 H21 L2,8 Z\" fill=\"#C9A24B\" opacity=\"0.9\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:21px\">Blazon<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;background:#0C0F17;border:1px solid rgba(201,162,75,.22);border-radius:9px;padding:4px;gap:2px\">\n        <div style=\"background:#C9A24B;color:#0C0F17;padding:8px 18px;border-radius:6px;font-size:13.5px;font-weight:600\">Gifter<\u002Fdiv>\n        <div title=\"Built out in this exploration: Gifter mode\" style=\"color:rgba(236,230,216,.45);padding:8px 18px;font-size:13.5px;cursor:not-allowed\">Enthusiast<\u002Fdiv>\n        <div title=\"Built out in this exploration: Gifter mode\" style=\"color:rgba(236,230,216,.45);padding:8px 18px;font-size:13.5px;cursor:not-allowed\">Serious<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:10px\">\n        <button style=\"background:transparent;color:#ECE6D8;border:1px solid rgba(201,162,75,.35);padding:9px 16px;border-radius:7px;font-size:13.5px;cursor:pointer\">Save<\u002Fbutton>\n        <button style=\"background:#C9A24B;color:#0C0F17;border:none;padding:9px 18px;border-radius:7px;font-size:13.5px;font-weight:600;cursor:pointer\">Export<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <div style=\"flex:1;display:flex;min-height:0\">\n\n      <div style=\"flex:1;background:radial-gradient(circle at 50% 42%, #1A2C44, #0B0E16);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden\">\n        <div style=\"position:absolute;top:20px;left:24px;font-size:11px;letter-spacing:2.5px;color:rgba(201,162,75,.7);font-weight:600\">LIVE PREVIEW<\u002Fdiv>\n\n        <sc-if value=\"{{ previewEmpty }}\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;gap:18px;opacity:.5\">\n            <svg width=\"160\" height=\"192\" viewBox=\"0 0 200 240\"><path d=\"M18,14 H182 V108 C182,170 144,204 100,226 C56,204 18,170 18,108 Z\" fill=\"none\" stroke=\"rgba(201,162,75,.5)\" stroke-width=\"2\" stroke-dasharray=\"7 8\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-size:14px;color:rgba(236,230,216,.6)\">Your arms will appear here.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ previewGenerating }}\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;gap:22px\">\n            <div style=\"width:44px;height:44px;border:3px solid rgba(201,162,75,.25);border-top-color:#C9A24B;border-radius:50%;animation:spin 1s linear infinite\"><\u002Fdiv>\n            <span style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;color:rgba(236,230,216,.85);max-width:18em;text-align:center;line-height:1.4\">Reading your story, consulting eight centuries of heraldry…<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ previewDesign }}\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;animation:fadein .5s ease\">\n            <div style=\"width:300px\">{{ studioShield }}<\u002Fdiv>\n            <sc-if value=\"{{ hasMotto }}\"><div style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:#C9A24B;margin-top:26px;letter-spacing:.5px\">“{{ motto }}”<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <aside style=\"width:466px;flex:none;background:#0F1826;border-left:1px solid rgba(201,162,75,.2);overflow-y:auto;padding:30px 30px 40px\">\n\n        <sc-if value=\"{{ isDescribe }}\">\n        <div style=\"animation:fadein .4s ease\">\n          <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:30px;margin:0 0 10px\">Tell us their story.<\u002Fh2>\n          <p style=\"font-size:14.5px;color:rgba(236,230,216,.66);line-height:1.55;margin:0 0 22px\">A name, a place, what they love, what they're like. The more human, the better the arms. We do the heraldry.<\u002Fp>\n          <textarea onchange=\"{{ setDesc }}\" oninput=\"{{ setDesc }}\" value=\"{{ desc }}\" placeholder=\"My grandmother was from the Highlands of Scotland. She loved astronomy and the night sky, and she was the steady one who held the family together…\" style=\"width:100%;min-height:150px;background:#0B111C;border:1px solid rgba(201,162,75,.28);border-radius:10px;padding:16px;color:#ECE6D8;font-size:15px;line-height:1.55;resize:vertical\"><\u002Ftextarea>\n          <div style=\"font-size:12px;color:rgba(236,230,216,.5);margin:16px 0 9px;letter-spacing:.5px\">OR TRY ONE OF THESE<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px\">\n            <sc-for list=\"{{ exampleChips }}\" as=\"c\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ c.onClick }}\" style=\"text-align:left;background:#0B111C;border:1px solid rgba(201,162,75,.2);border-radius:9px;padding:11px 14px;color:rgba(236,230,216,.82);font-size:13.5px;cursor:pointer\">{{ c.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <button onclick=\"{{ generate }}\" style=\"{{ generateBtnStyle }}\">{{ generateLabel }}<\u002Fbutton>\n          <p style=\"font-size:12px;color:rgba(236,230,216,.45);text-align:center;margin:14px 0 0;line-height:1.5\">No heraldry knowledge required. You can refine every choice afterwards.<\u002Fp>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isDesign }}\">\n        <div style=\"animation:fadein .4s ease\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px\">\n            <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:28px;margin:0\">Here's what we made.<\u002Fh2>\n            <button onclick=\"{{ restart }}\" style=\"background:transparent;border:none;color:#C9A24B;font-size:13px;cursor:pointer;text-decoration:underline\">Start over<\u002Fbutton>\n          <\u002Fdiv>\n          <p style=\"font-size:14px;color:rgba(236,230,216,.66);line-height:1.55;margin:0 0 20px\">Tap any card to swap a colour or shape. Nothing here needs a single heraldic term.<\u002Fp>\n\n          <sc-if value=\"{{ hasWarn }}\">\n            <div style=\"background:rgba(178,58,58,.16);border:1px solid #B23A3A;border-radius:10px;padding:13px 15px;margin-bottom:18px;display:flex;gap:11px;align-items:flex-start\">\n              <span style=\"color:#E08A8A;font-size:16px;line-height:1.2\">⚠<\u002Fspan>\n              <span style=\"font-size:13px;color:#F0CFCF;line-height:1.5\">{{ warn }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"background:#0B111C;border:1px solid rgba(201,162,75,.2);border-radius:12px;padding:18px;margin-bottom:14px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px\">\n              <span style=\"font-size:12px;letter-spacing:1.5px;color:rgba(201,162,75,.8);font-weight:600\">THE FIELD · COLOUR<\u002Fspan>\n              <span style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:#ECE6D8\">{{ fieldName }}<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"font-size:13px;color:rgba(236,230,216,.62);line-height:1.5;margin:0 0 13px\">{{ fieldRationale }}<\u002Fp>\n            <div style=\"display:flex;gap:9px;flex-wrap:wrap\">\n              <sc-for list=\"{{ fieldSwatches }}\" as=\"sw\" hint-placeholder-count=\"7\">\n                <button onclick=\"{{ sw.onClick }}\" title=\"{{ sw.label }}\" style=\"{{ sw.styleStr }}\"><\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#0B111C;border:1px solid rgba(201,162,75,.2);border-radius:12px;padding:18px;margin-bottom:14px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px\">\n              <span style=\"font-size:12px;letter-spacing:1.5px;color:rgba(201,162,75,.8);font-weight:600\">THE STRUCTURE<\u002Fspan>\n              <span style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:#ECE6D8\">{{ ordName }}<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"font-size:13px;color:rgba(236,230,216,.62);line-height:1.5;margin:0 0 13px\">{{ ordRationale }}<\u002Fp>\n            <div style=\"display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px\">\n              <sc-for list=\"{{ ordinaryPills }}\" as=\"p\" hint-placeholder-count=\"6\">\n                <button onclick=\"{{ p.onClick }}\" style=\"{{ p.styleStr }}\">{{ p.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font-size:11.5px;color:rgba(236,230,216,.5);margin-bottom:8px\">Its colour<\u002Fdiv>\n            <div style=\"display:flex;gap:9px;flex-wrap:wrap\">\n              <sc-for list=\"{{ ordSwatches }}\" as=\"sw\" hint-placeholder-count=\"7\">\n                <button onclick=\"{{ sw.onClick }}\" title=\"{{ sw.label }}\" style=\"{{ sw.styleStr }}\"><\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ hasCharge }}\">\n          <div style=\"background:#0B111C;border:1px solid rgba(201,162,75,.2);border-radius:12px;padding:18px;margin-bottom:14px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px\">\n              <span style=\"font-size:12px;letter-spacing:1.5px;color:rgba(201,162,75,.8);font-weight:600\">THE SYMBOL<\u002Fspan>\n              <span style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:#ECE6D8\">{{ chargeName }}<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"font-size:13px;color:rgba(236,230,216,.62);line-height:1.5;margin:0 0 13px\">{{ chargeRationale }}<\u002Fp>\n            <div style=\"display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px\">\n              <sc-for list=\"{{ chargePills }}\" as=\"p\" hint-placeholder-count=\"4\">\n                <button onclick=\"{{ p.onClick }}\" style=\"{{ p.styleStr }}\">{{ p.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:13px\">\n              <span style=\"font-size:11.5px;color:rgba(236,230,216,.5)\">How many<\u002Fspan>\n              <div style=\"display:flex;align-items:center;gap:12px;background:#16273E;border-radius:8px;padding:5px 6px\">\n                <button onclick=\"{{ decQty }}\" style=\"background:none;border:none;color:#ECE6D8;font-size:18px;cursor:pointer;width:24px\">−<\u002Fbutton>\n                <span style=\"font-size:15px;min-width:14px;text-align:center;font-weight:600\">{{ chargeQty }}<\u002Fspan>\n                <button onclick=\"{{ incQty }}\" style=\"background:none;border:none;color:#ECE6D8;font-size:18px;cursor:pointer;width:24px\">+<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:11.5px;color:rgba(236,230,216,.5);margin-bottom:8px\">Its colour<\u002Fdiv>\n            <div style=\"display:flex;gap:9px;flex-wrap:wrap\">\n              <sc-for list=\"{{ chargeSwatches }}\" as=\"sw\" hint-placeholder-count=\"7\">\n                <button onclick=\"{{ sw.onClick }}\" title=\"{{ sw.label }}\" style=\"{{ sw.styleStr }}\"><\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"background:#0B111C;border:1px solid rgba(201,162,75,.2);border-radius:12px;padding:18px\">\n            <div style=\"font-size:12px;letter-spacing:1.5px;color:rgba(201,162,75,.8);font-weight:600;margin-bottom:11px\">THE MOTTO<\u002Fdiv>\n            <input onchange=\"{{ setMotto }}\" oninput=\"{{ setMotto }}\" value=\"{{ motto }}\" placeholder=\"A few words they lived by…\" style=\"width:100%;background:transparent;border:none;border-bottom:1px solid rgba(201,162,75,.3);padding:6px 2px;color:#ECE6D8;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px\">\n          <\u002Fdiv>\n\n          <button style=\"width:100%;margin-top:20px;background:#C9A24B;color:#0C0F17;border:none;padding:15px;border-radius:9px;font-weight:600;font-size:15.5px;cursor:pointer\">Continue to your gift →<\u002Fbutton>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Faside>\n    <\u002Fdiv>\n\n    <div style=\"flex:none;background:#0A0D14;border-top:1.5px solid #C9A24B;padding:16px 28px;display:flex;align-items:center;gap:20px\">\n      <div style=\"display:flex;align-items:center;gap:12px;flex:none\">\n        <span title=\"The blazon is the formal description your arms are built from — the source of truth.\" style=\"width:24px;height:24px;border-radius:50%;border:1px solid rgba(201,162,75,.5);color:#C9A24B;display:flex;align-items:center;justify-content:center;font-size:13px;font-style:italic;cursor:help;font-family:'Cormorant Garamond',serif\">i<\u002Fspan>\n        <div style=\"display:flex;background:#16273E;border-radius:8px;padding:3px\">\n          <button onclick=\"{{ setBlazonFormal }}\" style=\"{{ blazonFormalBtn }}\">Blazon<\u002Fbutton>\n          <button onclick=\"{{ setBlazonPlain }}\" style=\"{{ blazonPlainBtn }}\">Plain English<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;min-width:0\">\n        <sc-if value=\"{{ hasDesign }}\">\n          <sc-if value=\"{{ blazonIsFormal }}\"><span style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:24px;color:#ECE6D8\">{{ studioBlazon }}<\u002Fspan><\u002Fsc-if>\n          <sc-if value=\"{{ blazonIsPlain }}\"><span style=\"font-size:17px;color:rgba(236,230,216,.82)\">{{ studioBlazon }}<\u002Fspan><\u002Fsc-if>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noDesign }}\"><span style=\"font-size:15px;color:rgba(236,230,216,.4);font-style:italic\">Your blazon will be written here as you design.<\u002Fspan><\u002Fsc-if>\n      <\u002Fdiv>\n      <button onclick=\"{{ copyBlazon }}\" style=\"{{ copyBtnStyle }}\">{{ copyLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    view: 'landing',\n    heroDesign: { field:'Gules', ordinary:'chevron', ordinaryTincture:'Or', charges:[{type:'mullet',tincture:'Argent',qty:3}] },\n    heroLang: 'formal',\n    step: 'describe',\n    desc: '',\n    generating: false,\n    design: null,\n    studioLang: 'plain',\n    copied: false,\n    selectedPreset: null,\n    hoverPart: null,\n    heroTouched: false,\n  };\n\n  TINCTURES = {\n    Or:      { hex:'#D4AF52', plain:'gold',   cls:'metal'  },\n    Argent:  { hex:'#E7E1D3', plain:'silver', cls:'metal'  },\n    Gules:   { hex:'#9F2C2C', plain:'red',    cls:'colour' },\n    Azure:   { hex:'#1F4E7A', plain:'blue',   cls:'colour' },\n    Sable:   { hex:'#15151C', plain:'black',  cls:'colour' },\n    Vert:    { hex:'#2E5A3E', plain:'green',  cls:'colour' },\n    Purpure: { hex:'#5A3A6B', plain:'purple', cls:'colour' },\n  };\n  TINCTURE_ORDER = ['Or','Argent','Gules','Azure','Sable','Vert','Purpure'];\n\n  ORDINARIES = {\n    saltire:{ plain:'diagonal cross' },\n    cross:  { plain:'cross' },\n    fess:   { plain:'horizontal band' },\n    pale:   { plain:'vertical band' },\n    bend:   { plain:'diagonal band' },\n    chevron:{ plain:'chevron' },\n  };\n  ORDINARY_ORDER = ['saltire','cross','fess','pale','bend','chevron'];\n\n  CHARGES = {\n    mullet:  { plain:'star',         plainPl:'stars',         label:'Star'    },\n    crescent:{ plain:'crescent moon',plainPl:'crescent moons',label:'Crescent'},\n    roundel: { plain:'disc',         plainPl:'discs',         label:'Disc'    },\n    lozenge: { plain:'diamond',      plainPl:'diamonds',      label:'Diamond' },\n  };\n  CHARGE_ORDER = ['mullet','crescent','roundel','lozenge'];\n\n  PRESETS = [\n    { chip:'Scottish · stars · the steady matriarch',\n      desc:'My grandmother was from the Highlands of Scotland. She loved astronomy and the night sky, and she was the steady one who held the whole family together.',\n      design:{ field:'Azure', ordinary:'saltire', ordinaryTincture:'Argent', charges:[{type:'mullet',tincture:'Or',qty:2}], motto:'Steadfast through the dark',\n        rationale:{ field:'Azure — the deep blue of a clear Highland night.',\n                    ordinary:'The saltire is the cross of Saint Andrew, patron of Scotland — for her roots.',\n                    charges:'Two stars for her love of astronomy, and the way she helped the family find its way.' } } },\n    { chip:'A builder · patient, dependable hands',\n      desc:'My dad spent his life building homes with his own hands. Patient, dependable, never flashy — the person everyone in the family leaned on.',\n      design:{ field:'Vert', ordinary:'chevron', ordinaryTincture:'Or', charges:[{type:'roundel',tincture:'Argent',qty:3}], motto:'By patient hands',\n        rationale:{ field:'Vert — green for growth and the steady, living work of building.',\n                    ordinary:'The chevron echoes a rooftop — the rafters of every home he raised.',\n                    charges:'Three simple discs, solid and plain, for dependability.' } } },\n    { chip:'Bold · a long military line',\n      desc:'Our family has a long military tradition, three generations of soldiers. Bold, fierce, and proud of where we come from.',\n      design:{ field:'Gules', ordinary:'cross', ordinaryTincture:'Or', charges:[{type:'mullet',tincture:'Argent',qty:1}], motto:'Without fear',\n        rationale:{ field:'Gules — red, the colour of courage and long service.',\n                    ordinary:'A cross Or, an ancient mark of honour borne into battle.',\n                    charges:'A single star for the spark of valour passed down the line.' } } },\n  ];\n\n  cap(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : s; }\n  numWord(n){ return ['','a','two','three','four'][n] || (''+n); }\n\n  // ---------- shield rendering ----------\n  starPoints(cx,cy,r){\n    let out=[];\n    for(let i=0;i<10;i++){\n      const rad = (i%2) ? r*0.4 : r;\n      const a = -Math.PI/2 + i*Math.PI/5;\n      out.push((cx+rad*Math.cos(a)).toFixed(1)+','+(cy+rad*Math.sin(a)).toFixed(1));\n    }\n    return out.join(' ');\n  }\n  ordinaryEl(R, type, hex){\n    switch(type){\n      case 'fess': return R('rect',{x:18,y:90,width:164,height:40,fill:hex});\n      case 'pale': return R('rect',{x:80,y:14,width:40,height:212,fill:hex});\n      case 'bend': return R('path',{d:'M18,14 L52,14 L182,184 L182,226 L148,226 L18,56 Z',fill:hex});\n      case 'cross': return R('g',{},[R('rect',{key:'v',x:83,y:14,width:34,height:212,fill:hex}),R('rect',{key:'h',x:18,y:93,width:164,height:34,fill:hex})]);\n      case 'chevron': return R('path',{d:'M18,192 L100,108 L182,192 L182,156 L100,72 L18,156 Z',fill:hex});\n      case 'saltire':\n      default:\n        return R('g',{},[\n          R('path',{key:'a',d:'M18,14 L48,14 L182,186 L182,226 L152,226 L18,54 Z',fill:hex}),\n          R('path',{key:'b',d:'M182,14 L152,14 L18,186 L18,226 L48,226 L182,54 Z',fill:hex}),\n        ]);\n    }\n  }\n  chargeSlots(n){\n    if(n<=1) return [[100,60]];\n    if(n===2) return [[60,56],[140,56]];\n    return [[58,54],[142,54],[100,150]];\n  }\n  chargeShape(R,type,cx,cy,hex,fieldHex,key){\n    if(type==='roundel') return R('circle',{key,cx,cy,r:19,fill:hex});\n    if(type==='lozenge') return R('polygon',{key,points:`${cx},${cy-23} ${cx+17},${cy} ${cx},${cy+23} ${cx-17},${cy}`,fill:hex});\n    if(type==='crescent') return R('g',{key},[\n      R('circle',{key:'o',cx,cy,r:19,fill:hex}),\n      R('circle',{key:'i',cx:cx+8,cy:cy-5,r:16,fill:fieldHex}),\n    ]);\n    return R('polygon',{key,points:this.starPoints(cx,cy,22),fill:hex,stroke:'rgba(0,0,0,.18)',strokeWidth:0.6}); // mullet\n  }\n  renderShield(d, opts){\n    opts = opts || {};\n    const R = React.createElement;\n    const T = this.TINCTURES;\n    const PATH = 'M18,14 H182 V108 C182,170 144,204 100,226 C56,204 18,170 18,108 Z';\n    const clip = 'clip-'+(opts.clipId||'x');\n    const fieldHex = T[d.field].hex;\n    const ordHex = T[d.ordinaryTincture] ? T[d.ordinaryTincture].hex : '#ECE6D8';\n    const ch = (d.charges && d.charges.length) ? d.charges[0] : null;\n    const interactive = !!opts.interactive;\n    const hov = opts.hoverPart;\n    const auto = !!opts.autoHint;\n    const enter = (p)=>interactive ? (()=>opts.onHover(p)) : undefined;\n    const leave = interactive ? (()=>opts.onHover(null)) : undefined;\n    const zoneStyle = (part, delay, base) => {\n      const st = Object.assign({ cursor: interactive?'pointer':'default', transition:'filter .2s ease' }, base||{});\n      if(interactive && hov===part) st.filter = 'brightness(1.3)';\n      else if(interactive && auto) st.animation = 'zonepulse 1.6s ease-in-out infinite '+delay;\n      else st.animation = 'chgpop .45s ease';\n      return st;\n    };\n\n    const inner = [\n      R('g',{ key:'ord-'+d.ordinary+'-'+d.ordinaryTincture,\n              onClick: interactive ? opts.onOrdinary : undefined,\n              onMouseEnter: enter('ord'), onMouseLeave: leave,\n              style: zoneStyle('ord','.55s') },\n        this.ordinaryEl(R, d.ordinary, ordHex)),\n    ];\n    if(ch){\n      const hex = T[ch.tincture].hex;\n      const slots = this.chargeSlots(ch.qty||1);\n      inner.push(R('g',{ key:'chg-'+ch.type+'-'+ch.tincture+'-'+ch.qty,\n              onClick: interactive ? opts.onCharge : undefined,\n              onMouseEnter: enter('chg'), onMouseLeave: leave,\n              style: zoneStyle('chg','1.1s') },\n        slots.map((p,i)=>this.chargeShape(R, ch.type, p[0], p[1], hex, fieldHex, i))));\n    }\n\n    return R('svg',{ viewBox:'0 0 200 240', width:'100%', role:'img',\n        'aria-label': this.blazon(d,'formal'),\n        style:{ display:'block', filter:'drop-shadow(0 16px 34px rgba(0,0,0,.5))' } },[\n      R('defs',{key:'defs'}, R('clipPath',{id:clip}, R('path',{d:PATH}))),\n      R('path',{ key:'field', d:PATH, fill:fieldHex,\n        onClick: interactive ? opts.onField : undefined,\n        onMouseEnter: enter('field'), onMouseLeave: leave,\n        style: zoneStyle('field','0s', { transition:'fill .45s ease, filter .2s ease' }) }),\n      R('g',{ key:'inner', clipPath:`url(#${clip})` }, inner),\n      R('path',{ key:'edge', d:PATH, fill:'none', stroke:'#C9A24B', strokeWidth:3.5, style:{ pointerEvents:'none' } }),\n    ]);\n  }\n\n  // ---------- blazon text ----------\n  blazon(d, lang){\n    if(!d) return '';\n    const T=this.TINCTURES, O=this.ORDINARIES, C=this.CHARGES;\n    if(lang==='formal'){\n      let s = d.field + ', a ' + d.ordinary + ' ' + d.ordinaryTincture.toLowerCase();\n      if(d.charges && d.charges.length){\n        const ch=d.charges[0], n=ch.qty||1;\n        const term = n>1 ? C[ch.type].plainPl.replace('crescent moons','crescents').replace('discs','roundels').replace('diamonds','lozenges').replace('stars','mullets')\n                         : ({mullet:'mullet',crescent:'crescent',roundel:'roundel',lozenge:'lozenge'})[ch.type];\n        s += ' between ' + this.numWord(n) + ' ' + term + ' ' + ch.tincture.toLowerCase();\n      }\n      return s;\n    }\n    let s = 'A ' + T[d.field].plain + ' shield with a ' + T[d.ordinaryTincture].plain + ' ' + O[d.ordinary].plain;\n    if(d.charges && d.charges.length){\n      const ch=d.charges[0], n=ch.qty||1;\n      const term = n>1 ? C[ch.type].plainPl : C[ch.type].plain;\n      s += ', and ' + this.numWord(n) + ' ' + T[ch.tincture].plain + ' ' + term;\n    }\n    return s + '.';\n  }\n\n  computeWarn(d){\n    if(!d) return null;\n    const T=this.TINCTURES;\n    const fc=T[d.field].cls, oc=T[d.ordinaryTincture].cls;\n    if(fc===oc){\n      const k = fc==='metal'?'Metal on metal':'Colour on colour';\n      const fix = fc==='metal'?'a colour':'a metal (Or or Argent)';\n      return k+' — heralds have frowned on this for 800 years. Try '+fix+' for the structure so it reads with contrast.';\n    }\n    if(d.charges && d.charges.length){\n      const cc=T[d.charges[0].tincture].cls;\n      if(cc===fc){\n        const k = fc==='metal'?'Metal on metal':'Colour on colour';\n        return k+' — the symbol barely shows against the field. Try the opposite class for it.';\n      }\n    }\n    return null;\n  }\n\n  // ---------- handlers ----------\n  goStudio = () => this.setState({ view:'studio' });\n  goLanding = () => this.setState({ view:'landing' });\n\n  HERO_METALS = ['Or','Argent'];\n  HERO_COLOURS = ['Gules','Azure','Vert','Purpure','Sable'];\n  HERO_FIELDS = ['Gules','Azure','Vert','Purpure','Sable','Or','Argent'];\n  HERO_SYMBOLS = [ {type:'mullet',qty:3}, {type:'crescent',qty:2}, {type:'roundel',qty:1}, {type:'mullet',qty:2}, {type:'lozenge',qty:3}, {type:'crescent',qty:1}, {type:'roundel',qty:3}, null ];\n\n  // metal goes on colour, colour goes on metal — return the valid contrast class for a given field\n  contrastPool(field){ return this.TINCTURES[field].cls==='metal' ? this.HERO_COLOURS : this.HERO_METALS; }\n  pickContrast(field, avoid){ const opts=this.contrastPool(field).filter(t=>t!==avoid); const pool=opts.length?opts:this.contrastPool(field); return pool[Math.floor(Math.random()*pool.length)]; }\n\n  cycleHeroField = () => {\n    const i=this.HERO_FIELDS.indexOf(this.state.heroDesign.field);\n    const next=this.HERO_FIELDS[(i+1)%this.HERO_FIELDS.length];\n    this.setState(s=>{\n      const ord = this.pickContrast(next, null);\n      const charges = s.heroDesign.charges.length ? [{...s.heroDesign.charges[0], tincture:this.pickContrast(next, ord)}] : [];\n      return { heroTouched:true, heroDesign:{...s.heroDesign, field:next, ordinaryTincture:ord, charges} };\n    });\n  };\n  cycleHeroOrdinary = () => {\n    this.setState(s=>{\n      const i=this.ORDINARY_ORDER.indexOf(s.heroDesign.ordinary);\n      const nextOrd=this.ORDINARY_ORDER[(i+1)%this.ORDINARY_ORDER.length];\n      const pool=this.contrastPool(s.heroDesign.field);\n      const ti=pool.indexOf(s.heroDesign.ordinaryTincture);\n      const nextT=pool[(ti+1)%pool.length];\n      return { heroTouched:true, heroDesign:{...s.heroDesign, ordinary:nextOrd, ordinaryTincture:nextT} };\n    });\n  };\n  cycleHeroSymbol = () => {\n    const cur=this.state.heroDesign.charges.length ? this.state.heroDesign.charges[0].type+'-'+this.state.heroDesign.charges[0].qty : 'none';\n    const keys=this.HERO_SYMBOLS.map(x=>x?x.type+'-'+x.qty:'none');\n    const next=this.HERO_SYMBOLS[(keys.indexOf(cur)+1)%this.HERO_SYMBOLS.length];\n    this.setState(s=>{\n      const charges = next ? [{type:next.type, qty:next.qty, tincture:this.pickContrast(s.heroDesign.field, s.heroDesign.ordinaryTincture)}] : [];\n      return { heroTouched:true, heroDesign:{...s.heroDesign, charges} };\n    });\n  };\n  surpriseMe = () => {\n    const pick=a=>a[Math.floor(Math.random()*a.length)];\n    const field=pick(this.HERO_FIELDS);\n    const ordinary=pick(this.ORDINARY_ORDER);\n    const ordinaryTincture=this.pickContrast(field, null);\n    const sym=pick(this.HERO_SYMBOLS);\n    const charges = sym ? [{type:sym.type, qty:sym.qty, tincture:this.pickContrast(field, ordinaryTincture)}] : [];\n    this.setState({ heroTouched:true, heroDesign:{ field, ordinary, ordinaryTincture, charges } });\n  };\n  heroHover = (p) => this.setState({ hoverPart:p });\n  hoverFieldEnter = () => this.setState({ hoverPart:'field' });\n  hoverOrdEnter = () => this.setState({ hoverPart:'ord' });\n  hoverChgEnter = () => this.setState({ hoverPart:'chg' });\n  hoverLeave = () => this.setState({ hoverPart:null });\n  setHeroFormal = () => this.setState({ heroLang:'formal' });\n  setHeroPlain = () => this.setState({ heroLang:'plain' });\n\n  setDesc = (e) => this.setState({ desc:e.target.value, selectedPreset:null });\n  usePreset = (i) => this.setState({ desc:this.PRESETS[i].desc, selectedPreset:i });\n  pickPreset = (text) => {\n    const t=(text||'').toLowerCase();\n    if(/build|home|garden|steady|craft|farm|patient|carpenter/.test(t)) return this.PRESETS[1];\n    if(/militar|bold|fierce|fight|soldier|brave|war|proud/.test(t)) return this.PRESETS[2];\n    return this.PRESETS[0];\n  };\n  generate = () => {\n    if(this.state.generating) return;\n    this.setState({ generating:true });\n    setTimeout(()=>{\n      const p = this.state.selectedPreset!=null ? this.PRESETS[this.state.selectedPreset] : this.pickPreset(this.state.desc);\n      this.setState({ generating:false, step:'design', studioLang:'plain',\n        design: JSON.parse(JSON.stringify(p.design)) });\n    }, 1700);\n  };\n  restart = () => this.setState({ step:'describe', design:null, desc:'', selectedPreset:null });\n\n  setField = (n) => this.setState(s=>({ design:{...s.design, field:n} }));\n  setOrdinaryTincture = (n) => this.setState(s=>({ design:{...s.design, ordinaryTincture:n} }));\n  setOrdinaryType = (k) => this.setState(s=>({ design:{...s.design, ordinary:k} }));\n  setChargeTincture = (n) => this.setState(s=>{ const c=[...s.design.charges]; c[0]={...c[0],tincture:n}; return {design:{...s.design,charges:c}}; });\n  setChargeType = (k) => this.setState(s=>{ const c=[...s.design.charges]; c[0]={...c[0],type:k}; return {design:{...s.design,charges:c}}; });\n  incQty = () => this.setState(s=>{ const c=[...s.design.charges]; c[0]={...c[0],qty:Math.min(3,(c[0].qty||1)+1)}; return {design:{...s.design,charges:c}}; });\n  decQty = () => this.setState(s=>{ const c=[...s.design.charges]; c[0]={...c[0],qty:Math.max(1,(c[0].qty||1)-1)}; return {design:{...s.design,charges:c}}; });\n  setMotto = (e) => { const v=e.target.value; this.setState(s=>({ design:{...s.design, motto:v} })); };\n\n  setBlazonFormal = () => this.setState({ studioLang:'formal' });\n  setBlazonPlain = () => this.setState({ studioLang:'plain' });\n  copyBlazon = () => {\n    const t=this.blazon(this.state.design,'formal');\n    if(navigator.clipboard) navigator.clipboard.writeText(t).catch(()=>{});\n    this.setState({ copied:true });\n    setTimeout(()=>this.setState({ copied:false }), 1600);\n  };\n\n  // ---------- swatch / pill builders ----------\n  buildSwatches(active, onPick){\n    return this.TINCTURE_ORDER.map(name=>{\n      const t=this.TINCTURES[name];\n      const on = name===active;\n      return { name, label:name+' ('+t.plain+')', onClick:()=>onPick(name),\n        styleStr:`width:32px;height:32px;border-radius:50%;background:${t.hex};cursor:pointer;padding:0;border:2px solid ${on?'#DBB85C':'rgba(236,230,216,.14)'};box-shadow:${on?'0 0 0 3px rgba(219,184,92,.35)':'none'};transition:box-shadow .15s` };\n    });\n  }\n  buildOrdPills(active, onPick){\n    return this.ORDINARY_ORDER.map(k=>{\n      const on=k===active;\n      return { key:k, label:this.cap(k), onClick:()=>onPick(k),\n        styleStr:`padding:7px 13px;border-radius:7px;font-size:12.5px;cursor:pointer;border:1px solid ${on?'#C9A24B':'rgba(201,162,75,.22)'};background:${on?'rgba(201,162,75,.18)':'transparent'};color:${on?'#ECE6D8':'rgba(236,230,216,.7)'}` };\n    });\n  }\n  buildChargePills(active, onPick){\n    return this.CHARGE_ORDER.map(k=>{\n      const on=k===active;\n      return { key:k, label:this.CHARGES[k].label, onClick:()=>onPick(k),\n        styleStr:`padding:7px 13px;border-radius:7px;font-size:12.5px;cursor:pointer;border:1px solid ${on?'#C9A24B':'rgba(201,162,75,.22)'};background:${on?'rgba(201,162,75,.18)':'transparent'};color:${on?'#ECE6D8':'rgba(236,230,216,.7)'}` };\n    });\n  }\n  langBtn(on){\n    return `padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:${on?'#C9A24B':'transparent'};color:${on?'#0C0F17':'rgba(236,230,216,.7)'}`;\n  }\n\n  renderVals(){\n    const s=this.state;\n    const d=s.design;\n    const isStudio = s.view==='studio';\n    const isLanding = s.view==='landing';\n\n    const gallery = [\n      { title:'House of Calder', d:{ field:'Or', ordinary:'saltire', ordinaryTincture:'Gules', charges:[{type:'roundel',tincture:'Azure',qty:1}] }, clipId:'g0' },\n      { title:'The Aldermere Arms', d:{ field:'Azure', ordinary:'bend', ordinaryTincture:'Or', charges:[{type:'crescent',tincture:'Argent',qty:2}] }, clipId:'g1' },\n      { title:'Família Vendral', d:{ field:'Argent', ordinary:'chevron', ordinaryTincture:'Sable', charges:[{type:'lozenge',tincture:'Gules',qty:3}] }, clipId:'g2' },\n    ].map(g=>({ title:g.title, blazon:this.blazon(g.d,'formal'), shield:this.renderShield(g.d,{clipId:g.clipId}) }));\n\n    const out = {\n      isLanding, isStudio,\n      // hero\n      heroShield: this.renderShield(s.heroDesign, { interactive:true, clipId:'hero', autoHint:!s.heroTouched, onField:this.cycleHeroField, onOrdinary:this.cycleHeroOrdinary, onCharge:this.cycleHeroSymbol, hoverPart:s.hoverPart, onHover:this.heroHover }),\n      heroBlazon: this.blazon(s.heroDesign, s.heroLang),\n      heroIsFormal: s.heroLang==='formal', heroIsPlain: s.heroLang==='plain',\n      heroFormalBtn: this.langBtn(s.heroLang==='formal'), heroPlainBtn: this.langBtn(s.heroLang==='plain'),\n      setHeroFormal:this.setHeroFormal, setHeroPlain:this.setHeroPlain,\n      cycleHeroField:this.cycleHeroField, cycleHeroOrdinary:this.cycleHeroOrdinary, cycleHeroSymbol:this.cycleHeroSymbol, surpriseMe:this.surpriseMe,\n      hoverFieldEnter:this.hoverFieldEnter, hoverOrdEnter:this.hoverOrdEnter, hoverChgEnter:this.hoverChgEnter, hoverLeave:this.hoverLeave,\n      heroFieldName:s.heroDesign.field, heroOrdName:this.cap(s.heroDesign.ordinary),\n      heroSymbolName: s.heroDesign.charges.length ? (this.CHARGES[s.heroDesign.charges[0].type].label + (s.heroDesign.charges[0].qty>1 ? ' ×'+s.heroDesign.charges[0].qty : '')) : 'None',\n      heroFieldSwatchStyle:`width:18px;height:18px;border-radius:50%;flex:none;background:${this.TINCTURES[s.heroDesign.field].hex};border:1px solid rgba(236,230,216,.25)`,\n      heroSymbolSwatchStyle: s.heroDesign.charges.length ? `width:18px;height:18px;border-radius:50%;flex:none;background:${this.TINCTURES[s.heroDesign.charges[0].tincture].hex};border:1px solid rgba(236,230,216,.25)` : `width:18px;height:18px;border-radius:50%;flex:none;background:transparent;border:1px dashed rgba(236,230,216,.35)`,\n      goStudio:this.goStudio, goLanding:this.goLanding,\n      gallery,\n      // studio shared\n      previewEmpty: !s.generating && !d,\n      previewGenerating: s.generating,\n      previewDesign: !s.generating && !!d,\n      isDescribe: s.step==='describe',\n      isDesign: s.step==='design' && !!d,\n      desc: s.desc, setDesc:this.setDesc, generate:this.generate, restart:this.restart,\n      generating: s.generating,\n      generateLabel: s.generating ? 'Designing…' : 'Design the coat of arms',\n      generateBtnStyle: `width:100%;margin-top:18px;background:${s.generating?'rgba(201,162,75,.5)':'#C9A24B'};color:#0C0F17;border:none;padding:15px;border-radius:9px;font-weight:600;font-size:15.5px;cursor:${s.generating?'default':'pointer'}`,\n      exampleChips: this.PRESETS.map((p,i)=>({ label:p.chip, onClick:()=>this.usePreset(i) })),\n      // blazon bar\n      hasDesign: !!d, noDesign: !d,\n      studioBlazon: this.blazon(d, s.studioLang),\n      blazonIsFormal: s.studioLang==='formal', blazonIsPlain: s.studioLang==='plain',\n      blazonFormalBtn: this.langBtn(s.studioLang==='formal'), blazonPlainBtn: this.langBtn(s.studioLang==='plain'),\n      setBlazonFormal:this.setBlazonFormal, setBlazonPlain:this.setBlazonPlain,\n      copyBlazon:this.copyBlazon, copied:s.copied,\n      copyLabel: s.copied ? 'Copied ✓' : 'Copy',\n      copyBtnStyle: `flex:none;background:transparent;border:1px solid rgba(201,162,75,.4);color:${s.copied?'#C9A24B':'#ECE6D8'};padding:9px 18px;border-radius:7px;font-size:13.5px;cursor:pointer;font-weight:500`,\n    };\n\n    if(d){\n      const T=this.TINCTURES;\n      out.studioShield = this.renderShield(d, { clipId:'studio' });\n      out.motto = d.motto || '';\n      out.hasMotto = !!(d.motto && d.motto.trim());\n      out.fieldName = d.field;\n      out.fieldRationale = d.rationale.field;\n      out.ordName = this.cap(d.ordinary);\n      out.ordRationale = d.rationale.ordinary;\n      out.hasCharge = d.charges.length>0;\n      out.fieldSwatches = this.buildSwatches(d.field, this.setField);\n      out.ordSwatches = this.buildSwatches(d.ordinaryTincture, this.setOrdinaryTincture);\n      out.ordinaryPills = this.buildOrdPills(d.ordinary, this.setOrdinaryType);\n      const w=this.computeWarn(d);\n      out.hasWarn = !!w; out.warn = w || '';\n      if(d.charges.length){\n        const ch=d.charges[0];\n        out.chargeName = this.CHARGES[ch.type].label;\n        out.chargeRationale = d.rationale.charges;\n        out.chargeQty = ch.qty||1;\n        out.chargeSwatches = this.buildSwatches(ch.tincture, this.setChargeTincture);\n        out.chargePills = this.buildChargePills(ch.type, this.setChargeType);\n      }\n    }\n    return out;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
